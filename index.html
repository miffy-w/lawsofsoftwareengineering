<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="软件工程法则 — 塑造软件系统、团队和决策的原则与模式。56 条经典软件工程法则的中文翻译。">
<meta property="og:title" content="软件工程法则">
<meta property="og:description" content="塑造软件系统、团队和决策的原则与模式 — 56 条经典软件工程法则的中文翻译">

<script>(function(){var t;try{t=localStorage.getItem('theme')}catch(e){}document.documentElement.setAttribute('data-theme',t||(window.matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light'))})()</script>
<style>
  :root {
    --bg: #f8f9fa;
    --card-bg: #ffffff;
    --text: #1a1a2e;
    --text-heading: #111827;
    --text-body: #4b5563;
    --text-secondary: #6b7280;
    --text-muted: #9ca3af;
    --border: #e5e7eb;
    --border-strong: #d1d5db;
    --accent: #2563eb;
    --accent-light: #eff6ff;
    --tag-level-bg: #f0fdf4;
    --tag-level-mid-bg: #fefce8;
    --tag-level-senior-bg: #fef2f2;
    --shadow: rgba(0,0,0,0.08);
    --blockquote-bg: #f0f4ff;
    --blockquote-text: #1e40af;
    --section-heading-border: #f3f4f6;
  }
  [data-theme="dark"] {
    --bg: #0f172a;
    --card-bg: #1e293b;
    --text: #e2e8f0;
    --text-heading: #f1f5f9;
    --text-body: #cbd5e1;
    --text-secondary: #94a3b8;
    --text-muted: #64748b;
    --border: #334155;
    --border-strong: #475569;
    --accent: #60a5fa;
    --accent-light: #1e3a5f;
    --tag-level-bg: #14532d;
    --tag-level-mid-bg: #5c4b0a;
    --tag-level-senior-bg: #7f1d1d;
    --shadow: rgba(0,0,0,0.3);
    --blockquote-bg: #1e3a5f;
    --blockquote-text: #93c5fd;
    --section-heading-border: #1e293b;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", "Noto Sans SC", "Segoe UI", sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    transition: background 0.2s, color 0.2s;
  }
  .container { max-width: 1200px; margin: 0 auto; padding: 0 20px; }

  /* Theme toggle */
  .theme-toggle {
    position: absolute; top: 16px; right: 20px;
    display: flex; align-items: center; gap: 6px; padding: 5px 14px;
    border-radius: 9999px; border: 1px solid var(--border-strong);
    background: var(--card-bg); cursor: pointer;
    font-size: 0.85rem; font-family: inherit; color: var(--text-secondary);
    transition: all 0.2s ease; white-space: nowrap;
  }
  .theme-toggle:hover { border-color: var(--accent); color: var(--text); }
  .theme-toggle svg { width: 16px; height: 16px; flex-shrink: 0; }

  /* Header */
  header { background: var(--card-bg); border-bottom: 1px solid var(--border); padding: 40px 0 32px; text-align: center; position: relative; }
  header h1 { font-size: 2.25rem; font-weight: 800; color: var(--text-heading); margin-bottom: 8px; }
  header p { font-size: 1.1rem; color: var(--text-secondary); }

  /* Filters */
  .filters { padding: 24px 0 20px; display: flex; flex-wrap: wrap; gap: 12px; justify-content: center; align-items: center; }
  .filter-group { display: flex; flex-wrap: wrap; gap: 6px; }
  .filter-label { font-size: 0.8rem; font-weight: 600; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.05em; margin-right: 4px; align-self: center; }
  .filter-btn {
    padding: 6px 16px; border: 1px solid var(--border-strong); border-radius: 9999px;
    background: var(--card-bg); color: var(--text); font-size: 0.875rem; cursor: pointer;
    transition: all 0.15s ease; font-family: inherit; white-space: nowrap;
  }
  .filter-btn:hover { border-color: var(--accent); color: var(--accent); }
  .filter-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .filter-divider { width: 1px; height: 24px; background: var(--border-strong); margin: 0 8px; }

  /* Cards Grid */
  .cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 20px; padding: 0 0 60px; }
  .card {
    background: var(--card-bg); border: 1px solid var(--border); border-radius: 10px; padding: 24px;
    cursor: pointer; transition: all 0.2s ease; display: block; text-decoration: none; color: inherit;
  }
  .card:hover { box-shadow: 0 4px 12px var(--shadow); border-color: var(--accent); transform: translateY(-2px); }
  .card-title { font-size: 1.15rem; font-weight: 700; color: var(--text-heading); margin-bottom: 4px; }
  .card-title-en { font-size: 0.8rem; color: var(--text-muted); font-weight: 400; margin-bottom: 10px; }
  .card-desc { font-size: 0.925rem; color: var(--text-body); line-height: 1.55; margin-bottom: 14px; }
  .card-tags { display: flex; gap: 6px; flex-wrap: wrap; }
  .tag {
    display: inline-block; padding: 2px 10px; border-radius: 9999px;
    font-size: 0.75rem; font-weight: 600;
  }
  .tag-group { background: var(--accent-light); color: var(--accent); }
  .tag-level { background: var(--tag-level-bg); color: #16a34a; }
  .tag-level.mid { background: var(--tag-level-mid-bg); color: #ca8a04; }
  .tag-level.senior { background: var(--tag-level-senior-bg); color: #dc2626; }

  /* Empty state */
  .empty-state { text-align: center; padding: 60px 20px; color: var(--text-muted); display: none; }
  .empty-state.show { display: block; }

  /* Footer */
  footer { text-align: center; padding: 32px 20px; border-top: 1px solid var(--border); font-size: 0.85rem; color: var(--text-muted); }
  footer a { color: var(--accent); text-decoration: none; }
  footer a:hover { text-decoration: underline; }

  @media (max-width: 768px) {
    header h1 { font-size: 1.75rem; }
    .cards-grid { grid-template-columns: 1fr; }
    .filter-divider { display: none; }
    .theme-toggle { top: 10px; right: 12px; padding: 4px 12px; font-size: 0.8rem; }
  }
</style>
</head>
<body>
<header>
  <button class="theme-toggle" id="theme-toggle" aria-label="切换主题" title="切换明暗主题"><svg id="sun-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg><svg id="moon-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg><span id="theme-label">暗色</span></button>
  <div class="container">
    <h1>软件工程法则</h1>
    <p>塑造软件系统、团队和决策的原则与模式 — 共 56 条</p>
  </div>
</header>

<div class="container">
  <div class="filters">
    <span class="filter-label">级别</span>
    <div class="filter-group" id="level-filters">
      <button class="filter-btn active" data-level="all">全部</button>
      <button class="filter-btn" data-level="junior">初级</button>
      <button class="filter-btn" data-level="mid">中级</button>
      <button class="filter-btn" data-level="senior">高级</button>
    </div>
    <span class="filter-divider"></span>
    <span class="filter-label">类别</span>
    <div class="filter-group" id="group-filters">
      <button class="filter-btn active" data-group="all">全部</button>
    </div>
  </div>

  <div class="cards-grid" id="cards-container"></div>
  <div class="empty-state" id="empty-state">当前筛选条件下没有匹配的法则，请尝试调整筛选条件。</div>
</div>

<footer>
  <div class="container">
    <p>&copy; 2026 <a href="https://lawsofsoftwareengineering.com/" target="_blank" rel="noopener">Dr. Milan Milanovi&cacute;</a></p>
    <p>中文翻译 &middot; 内容基于 <a href="https://creativecommons.org/licenses/by-nc-nd/4.0/" target="_blank" rel="noopener">CC BY-NC-ND 4.0</a> 许可</p>
  </div>
</footer>

<script src="laws-zh.js"></script>
<script>
(function() {
  var toggle = document.getElementById('theme-toggle');
  var html = document.documentElement;

  function setTheme(theme) {
    html.setAttribute('data-theme', theme);
    var isDark = theme === 'dark';
    document.getElementById('sun-icon').style.display = isDark ? 'none' : '';
    document.getElementById('moon-icon').style.display = isDark ? '' : 'none';
    document.getElementById('theme-label').textContent = isDark ? '亮色' : '暗色';
    try { localStorage.setItem('theme', theme); } catch(e) {}
  }

  var saved = null;
  try { saved = localStorage.getItem('theme'); } catch(e) {}
  var preferred = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
  setTheme(saved || preferred);

  toggle.addEventListener('click', function() {
    setTheme(html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
  });

  window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', function(e) {
    var s = null; try { s = localStorage.getItem('theme'); } catch(ex) {}
    if (!s) setTheme(e.matches ? 'dark' : 'light');
  });
})();
</script>
<script>
(function() {
  var groups = [...new Set(LAWS.map(function(l) { return l.group; }))];
  var container = document.getElementById('group-filters');
  groups.forEach(function(g) {
    var btn = document.createElement('button');
    btn.className = 'filter-btn';
    btn.dataset.group = g;
    btn.textContent = GROUP_MAP[g] || g;
    container.appendChild(btn);
  });
})();

function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function renderCards(filtered) {
  var container = document.getElementById('cards-container');
  var empty = document.getElementById('empty-state');
  container.innerHTML = '';
  if (filtered.length === 0) {
    empty.classList.add('show');
    return;
  }
  empty.classList.remove('show');
  filtered.forEach(function(law) {
    var levelClass = law.experience === 'senior' ? 'senior' : (law.experience === 'mid' ? 'mid' : '');
    var html =
      '<a class="card" href="/laws/' + esc(law.slug) + '/">' +
        '<div class="card-title">' + esc(law.title) + '</div>' +
        '<div class="card-title-en">' + esc(law.titleEn) + '</div>' +
        '<div class="card-desc">' + esc(law.description) + '</div>' +
        '<div class="card-tags">' +
          '<span class="tag tag-group">' + esc(GROUP_MAP[law.group] || law.group) + '</span>' +
          '<span class="tag tag-level' + (levelClass ? ' ' + levelClass : '') + '">' + esc(LEVEL_MAP[law.experience] || law.experience) + '</span>' +
        '</div>' +
      '</a>';
    container.insertAdjacentHTML('beforeend', html);
  });
}

var activeLevel = 'all';
var activeGroup = 'all';

function filterLaws() {
  var result = LAWS;
  if (activeLevel !== 'all') result = result.filter(function(l) { return l.experience === activeLevel; });
  if (activeGroup !== 'all') result = result.filter(function(l) { return l.group === activeGroup; });
  renderCards(result);
}

function setupFilter(containerId, key) {
  document.getElementById(containerId).addEventListener('click', function(e) {
    if (!e.target.classList.contains('filter-btn')) return;
    this.querySelectorAll('.filter-btn').forEach(function(b) { b.classList.remove('active'); });
    e.target.classList.add('active');
    if (key === 'level') activeLevel = e.target.dataset.level;
    else activeGroup = e.target.dataset.group;
    filterLaws();
  });
}
setupFilter('level-filters', 'level');
setupFilter('group-filters', 'group');

renderCards(LAWS);
</script>
</body>
</html>
